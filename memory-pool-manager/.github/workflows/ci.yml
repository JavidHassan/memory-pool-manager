name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Release
            cmake_flags: "-DCMAKE_BUILD_TYPE=Release"
          - name: ASan+UBSan
            cmake_flags: "-DSANITIZE=address,undefined -DCMAKE_BUILD_TYPE=RelWithDebInfo"
          - name: TSan
            cmake_flags: "-DSANITIZE=thread -DCMAKE_BUILD_TYPE=RelWithDebInfo"

    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Unit tests
        run: ./build/unit_tests

      - name: Stress test (8 threads)
        run: ./build/stress_test 8 100000

  valgrind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Valgrind — unit tests (zero-leak gate)
        run: valgrind --leak-check=full --error-exitcode=1 ./build/unit_tests

      - name: Valgrind — multithreaded stress (zero-leak gate)
        run: valgrind --leak-check=full --error-exitcode=1 ./build/stress_test 4 20000

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Run benchmarks
        run: ./build/benchmark
